<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 人格探知</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0e17;
  --bg-card: rgba(16, 22, 38, 0.85);
  --bg-card-hover: rgba(22, 30, 50, 0.9);
  --gold: #c9a96e;
  --gold-light: #e0c78a;
  --gold-dim: #8b7348;
  --text: #e8e4dd;
  --text-dim: #8a8780;
  --text-muted: #5a5752;
  --accent-teal: #5b9a8b;
  --accent-rose: #c47a6b;
  --accent-blue: #6b8db5;
  --border: rgba(201, 169, 110, 0.15);
  --border-active: rgba(201, 169, 110, 0.4);
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* Stars background */
.stars {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite;
  animation-delay: var(--delay);
  opacity: 0;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 0.8; }
}

/* Nebula glow */
.nebula {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
  opacity: 0.15;
}

.nebula-1 {
  top: -20%; left: -10%;
  width: 600px; height: 600px;
  background: radial-gradient(circle, var(--gold-dim), transparent 70%);
  animation: nebula-drift 20s ease-in-out infinite;
}

.nebula-2 {
  bottom: -15%; right: -10%;
  width: 500px; height: 500px;
  background: radial-gradient(circle, var(--accent-teal), transparent 70%);
  animation: nebula-drift 25s ease-in-out infinite reverse;
}

.nebula-3 {
  top: 40%; left: 50%;
  width: 400px; height: 400px;
  background: radial-gradient(circle, var(--accent-rose), transparent 70%);
  animation: nebula-drift 18s ease-in-out infinite 5s;
}

@keyframes nebula-drift {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(30px, -20px); }
  50% { transform: translate(-20px, 30px); }
  75% { transform: translate(-30px, -10px); }
}

/* Main container */
.container {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Sections */
.section {
  display: none;
  width: 100%;
  animation: fadeSlideIn 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
}

.section.active {
  display: block;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === LANDING PAGE === */
.landing {
  text-align: center;
  padding: 60px 0;
}

.landing-badge {
  display: inline-block;
  padding: 6px 20px;
  border: 1px solid var(--border-active);
  border-radius: 100px;
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 32px;
  backdrop-filter: blur(10px);
  background: rgba(201, 169, 110, 0.05);
}

.landing h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(42px, 7vw, 72px);
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1.1;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dim) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.landing .subtitle {
  font-size: 18px;
  color: var(--text-dim);
  font-weight: 300;
  margin-bottom: 48px;
  letter-spacing: 1px;
}

.landing-stats {
  display: flex;
  justify-content: center;
  gap: 48px;
  margin-bottom: 56px;
  flex-wrap: wrap;
}

.landing-stat {
  text-align: center;
}

.landing-stat .num {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--gold);
  display: block;
}

.landing-stat .label {
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

.dimension-preview {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 48px;
}

.dim-badge {
  padding: 16px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  backdrop-filter: blur(10px);
  transition: var(--transition);
}

.dim-badge:hover {
  border-color: var(--border-active);
  transform: translateY(-2px);
}

.dim-badge .dim-letter {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--gold);
  display: block;
}

.dim-badge .dim-name {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 40px;
  border: none;
  border-radius: 100px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
}

.btn-primary {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
  color: #0a0e17;
  box-shadow: 0 8px 32px rgba(201, 169, 110, 0.2);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(201, 169, 110, 0.35);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-secondary {
  background: transparent;
  border: 1px solid var(--border-active);
  color: var(--gold);
  backdrop-filter: blur(10px);
}

.btn-secondary:hover {
  background: rgba(201, 169, 110, 0.08);
  border-color: var(--gold);
}

.btn-sm {
  padding: 10px 24px;
  font-size: 14px;
}

/* === QUIZ SECTION === */
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 12px;
}

.quiz-progress-info {
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

.quiz-progress-bar-outer {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 100px;
  margin-bottom: 40px;
  overflow: hidden;
}

.quiz-progress-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-light));
  border-radius: 100px;
  transition: width 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
  width: 0%;
}

.quiz-dimension-indicator {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.quiz-dim-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: var(--transition);
}

.quiz-dim-dot.active {
  background: var(--gold);
  box-shadow: 0 0 12px rgba(201, 169, 110, 0.5);
}

.quiz-dim-dot.done {
  background: var(--accent-teal);
}

.question-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px;
  backdrop-filter: blur(20px);
  margin-bottom: 32px;
  transition: var(--transition);
}

.question-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 2px;
  margin-bottom: 16px;
}

.question-text {
  font-size: 20px;
  font-weight: 400;
  line-height: 1.5;
  margin-bottom: 32px;
  color: var(--text);
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  background: rgba(255,255,255,0.02);
  position: relative;
  overflow: hidden;
}

.option:hover {
  border-color: var(--border-active);
  background: rgba(201, 169, 110, 0.05);
}

.option.selected {
  border-color: var(--gold);
  background: rgba(201, 169, 110, 0.1);
  box-shadow: 0 0 20px rgba(201, 169, 110, 0.1);
}

.option-radio {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--text-muted);
  margin-right: 16px;
  flex-shrink: 0;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

.option.selected .option-radio {
  border-color: var(--gold);
  background: var(--gold);
}

.option.selected .option-radio::after {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #0a0e17;
}

.option-label {
  font-size: 15px;
  color: var(--text-dim);
  transition: var(--transition);
}

.option.selected .option-label {
  color: var(--text);
}

.quiz-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}

.quiz-nav .btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  pointer-events: none;
}

/* === RESULTS SECTION === */
.results {
  text-align: center;
}

.result-type-badge {
  display: inline-block;
  font-family: 'Playfair Display', serif;
  font-size: clamp(48px, 10vw, 80px);
  font-weight: 900;
  letter-spacing: 8px;
  background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dim));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.result-type-name {
  font-size: 20px;
  color: var(--text);
  font-weight: 400;
  margin-bottom: 8px;
}

.result-type-nickname {
  font-size: 14px;
  color: var(--text-dim);
  font-style: italic;
  margin-bottom: 40px;
}

/* Dimension bars */
.dimension-bars {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 48px;
  text-align: left;
}

.dim-bar-group {
  display: flex;
  align-items: center;
  gap: 12px;
}

.dim-bar-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  width: 30px;
  text-align: center;
  color: var(--gold);
}

.dim-bar-track {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 100px;
  position: relative;
  overflow: visible;
}

.dim-bar-fill {
  height: 100%;
  border-radius: 100px;
  transition: width 1.2s cubic-bezier(0.25, 0.1, 0.25, 1);
  position: relative;
}

.dim-bar-fill.ei { background: linear-gradient(90deg, var(--accent-teal), var(--gold)); }
.dim-bar-fill.sn { background: linear-gradient(90deg, var(--accent-blue), var(--gold)); }
.dim-bar-fill.tf { background: linear-gradient(90deg, var(--accent-rose), var(--gold)); }
.dim-bar-fill.jp { background: linear-gradient(90deg, #8b7eb5, var(--gold)); }

.dim-bar-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  width: 40px;
  text-align: right;
}

.dim-bar-label-right {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  width: 30px;
  text-align: center;
  color: var(--text-dim);
}

/* Result cards */
.result-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 40px;
  text-align: left;
}

.result-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  backdrop-filter: blur(10px);
}

.result-card h3 {
  font-size: 14px;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.result-card p, .result-card li {
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.7;
}

.result-card ul {
  list-style: none;
  padding: 0;
}

.result-card li::before {
  content: '— ';
  color: var(--gold-dim);
}

/* Detailed description */
.result-desc {
  text-align: left;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 40px;
  backdrop-filter: blur(10px);
}

.result-desc h3 {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  color: var(--gold);
  margin-bottom: 16px;
}

.result-desc p {
  font-size: 15px;
  color: var(--text-dim);
  line-height: 1.8;
  margin-bottom: 12px;
}

/* Share section */
.share-section {
  margin-bottom: 40px;
}

/* Type grid */
.type-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 24px;
}

.type-cell {
  padding: 10px 6px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  text-align: center;
  transition: var(--transition);
  background: var(--bg-card);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-dim);
}

.type-cell:hover {
  border-color: var(--border-active);
  color: var(--gold);
  background: rgba(201, 169, 110, 0.05);
}

.type-cell.highlight {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201, 169, 110, 0.1);
  box-shadow: 0 0 20px rgba(201, 169, 110, 0.15);
}

/* All types section */
.all-types-section {
  text-align: left;
  padding: 20px 0;
}

.all-types-section h2 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  color: var(--gold);
  text-align: center;
  margin-bottom: 32px;
}

.type-accordion {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  background: var(--bg-card);
  overflow: hidden;
  transition: var(--transition);
}

.type-accordion-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  cursor: pointer;
  transition: var(--transition);
}

.type-accordion-header:hover {
  background: rgba(201, 169, 110, 0.03);
}

.type-accordion-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 2px;
}

.type-accordion-name {
  font-size: 14px;
  color: var(--text-dim);
  flex: 1;
  margin-left: 16px;
}

.type-accordion-arrow {
  color: var(--text-muted);
  transition: var(--transition);
  font-size: 12px;
}

.type-accordion.open .type-accordion-arrow {
  transform: rotate(180deg);
  color: var(--gold);
}

.type-accordion-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
}

.type-accordion.open .type-accordion-body {
  max-height: 600px;
}

.type-accordion-content {
  padding: 0 24px 24px;
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.8;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}

.type-accordion-content h4 {
  color: var(--text);
  font-size: 14px;
  margin: 12px 0 6px;
}

/* Responsive */
@media (max-width: 640px) {
  .container { padding: 16px; }
  .dimension-preview { grid-template-columns: repeat(2, 1fr); }
  .result-cards { grid-template-columns: 1fr; }
  .type-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .type-cell { font-size: 11px; padding: 8px 4px; }
  .question-card { padding: 24px; }
  .question-text { font-size: 17px; }
  .landing-stats { gap: 24px; }
  .landing h1 { font-size: 36px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(201, 169, 110, 0.2); border-radius: 100px; }
::-webkit-scrollbar-thumb:hover { background: rgba(201, 169, 110, 0.4); }

/* Pulse animation */
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(201, 169, 110, 0.4); }
  50% { box-shadow: 0 0 0 12px rgba(201, 169, 110, 0); }
}

.pulse { animation: pulse 2s infinite; }

/* === RADAR CHART === */
.radar-container {
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
}

.radar-wrapper {
  position: relative;
  width: 320px;
  height: 320px;
}

.radar-wrapper canvas {
  width: 100%;
  height: 100%;
}

/* === MATCH SECTION === */
.match-section {
  margin-bottom: 40px;
  text-align: left;
}

.match-section h3 {
  font-size: 14px;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
  text-align: center;
}

.match-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 400px;
  overflow-y: auto;
  padding-right: 8px;
}

.match-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: var(--transition);
}

.match-item:hover {
  border-color: var(--border-active);
  background: rgba(201, 169, 110, 0.05);
}

.match-item.match-self {
  border-color: var(--gold);
  background: rgba(201, 169, 110, 0.1);
}

.match-rank {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
  width: 24px;
  text-align: center;
}

.match-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: var(--gold);
  width: 48px;
}

.match-name {
  font-size: 13px;
  color: var(--text-dim);
  flex: 1;
}

.match-bar-outer {
  width: 120px;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 100px;
  overflow: hidden;
}

.match-bar-inner {
  height: 100%;
  border-radius: 100px;
  background: linear-gradient(90deg, var(--accent-teal), var(--gold));
  transition: width 1s ease;
}

.match-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-dim);
  width: 42px;
  text-align: right;
}

/* === HISTORY SECTION === */
.history-section {
  text-align: center;
  padding: 20px 0;
}

.history-section h2 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  color: var(--gold);
  margin-bottom: 8px;
}

.history-section .history-subtitle {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 32px;
}

.history-empty {
  padding: 48px;
  color: var(--text-muted);
  font-size: 14px;
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  text-align: left;
}

.history-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
}

.history-card:hover {
  border-color: var(--border-active);
  background: rgba(201, 169, 110, 0.05);
}

.history-card .hc-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 2px;
  width: 56px;
}

.history-card .hc-name {
  font-size: 14px;
  color: var(--text);
  flex: 1;
}

.history-card .hc-date {
  font-size: 12px;
  color: var(--text-muted);
  text-align: right;
}

.history-card .hc-delete {
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  transition: var(--transition);
  font-size: 14px;
  background: none;
  border: none;
}

.history-card .hc-delete:hover {
  color: var(--accent-rose);
}

function getCompatibility(userType) {
  const matches = compatibilityMatrix[userType];
  if (!matches) return [];
  return Object.entries(matches)
    .map(([type, score]) => ({ type, score, name: typeData[type]?.name || '', nickname: typeData[type]?.nickname || '' }))
    .sort((a, b) => b.score - a.score);
}

// ==================== LOCAL STORAGE ====================
const STORAGE_KEY = 'mbti_test_history';

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}

function saveResultToHistory(type, percentages, rawScores) {
  const history = loadHistory();
  history.push({
    type,
    name: typeData[type]?.name || '',
    nickname: typeData[type]?.nickname || '',
    percentages,
    rawScores,
    timestamp: Date.now(),
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
  });
  // Keep max 20 records
  if (history.length > 20) history.splice(0, history.length - 20);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function deleteHistoryItem(id) {
  let history = loadHistory();
  history = history.filter(h => h.id !== id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  renderHistory();
}

// ==================== RADAR CHART ====================
function drawRadarChart(canvas, percentages) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width = 320;
  const H = canvas.height = 320;
  const cx = W / 2;
  const cy = H / 2;
  const radius = 120;
  const levels = 5;
  const dimKeys = ['ei', 'sn', 'tf', 'jp'];
  const dimLabels = ['E/I 外向/内向', 'S/N 感觉/直觉', 'T/F 思考/情感', 'J/P 判断/感知'];
  const totalDims = dimKeys.length;

  ctx.clearRect(0, 0, W, H);

  // Draw background grid
  for (let level = 1; level <= levels; level++) {
    const r = (radius / levels) * level;
    ctx.beginPath();
    for (let i = 0; i < totalDims; i++) {
      const angle = (Math.PI * 2 * i) / totalDims - Math.PI / 2;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(201,169,110,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw axis lines
  for (let i = 0; i < totalDims; i++) {
    const angle = (Math.PI * 2 * i) / totalDims - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + radius * Math.cos(angle), cy + radius * Math.sin(angle));
    ctx.strokeStyle = 'rgba(201,169,110,0.15)';
    ctx.stroke();
  }

  // Draw data polygon
  ctx.beginPath();
  for (let i = 0; i < totalDims; i++) {
    const pct = percentages[dimKeys[i]] / 100;
    const r = radius * pct;
    const angle = (Math.PI * 2 * i) / totalDims - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(201,169,110,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(201,169,110,0.9)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Draw data points
  for (let i = 0; i < totalDims; i++) {
    const pct = percentages[dimKeys[i]] / 100;
    const r = radius * pct;
    const angle = (Math.PI * 2 * i) / totalDims - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#c9a96e';
    ctx.fill();
    ctx.strokeStyle = '#0a0e17';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Draw labels
  ctx.font = '12px "Noto Sans SC", sans-serif';
  ctx.fillStyle = '#8a8780';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < totalDims; i++) {
    const angle = (Math.PI * 2 * i) / totalDims - Math.PI / 2;
    const labelR = radius + 28;
    const x = cx + labelR * Math.cos(angle);
    const y = cy + labelR * Math.sin(angle);
    ctx.fillText(dimLabels[i], x, y);
  }

  // Draw percentage at each point
  ctx.font = '11px "JetBrains Mono", monospace';
  ctx.fillStyle = '#e0c78a';
  for (let i = 0; i < totalDims; i++) {
    const pct = percentages[dimKeys[i]] / 100;
    const r = radius * pct + 16;
    const angle = (Math.PI * 2 * i) / totalDims - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    ctx.fillText(percentages[dimKeys[i]] + '%', x, y);
  }
}

// ==================== QUIZ LOGIC ====================
function startQuiz() {
  quizStarted = true;
  currentQuestionIndex = 0;
  answers = {};
  showSection('section-quiz');
  renderQuestion();
  renderDimDots();
  updateProgress();
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderQuestion() {
  const q = questions[currentQuestionIndex];
  document.getElementById('question-number').textContent = `Q${currentQuestionIndex + 1}`;
  document.getElementById('question-text').textContent = q.text;

  const dimNames = { ei: '外向 E / 内向 I', sn: '感觉 S / 直觉 N', tf: '思考 T / 情感 F', jp: '判断 J / 感知 P' };
  document.getElementById('quiz-dimension-text').textContent = '维度：' + dimNames[q.dim];

  const options = [
    { value: 5, label: '非常同意' },
    { value: 4, label: '比较同意' },
    { value: 3, label: '中立 / 不确定' },
    { value: 2, label: '不太同意' },
    { value: 1, label: '非常不同意' },
  ];

  // Reverse options for -1 direction questions so higher score = second letter
  const displayOptions = q.dir === 1 ? options : [...options].reverse();

  const container = document.getElementById('options-container');
  container.innerHTML = displayOptions.map((opt, idx) => {
    const selected = answers[currentQuestionIndex] === opt.value;
    return `
      <div class="option ${selected ? 'selected' : ''}" onclick="selectAnswer(${opt.value})" data-value="${opt.value}">
        <div class="option-radio"></div>
        <span class="option-label">${opt.label}</span>
      </div>
    `;
  }).join('');

  updateNavButtons();
  updateProgress();
}

function selectAnswer(value) {
  answers[currentQuestionIndex] = value;
  document.querySelectorAll('.option').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.value) === value);
  });
  updateNavButtons();
}

function updateNavButtons() {
  document.getElementById('btn-prev').disabled = currentQuestionIndex === 0;
  const hasAnswer = answers[currentQuestionIndex] !== undefined;
  document.getElementById('btn-next').disabled = !hasAnswer;
  document.getElementById('answer-status').textContent = hasAnswer ? '已选择' : '请选择一个选项';
}

function nextQuestion() {
  if (answers[currentQuestionIndex] === undefined) return;
  if (currentQuestionIndex < questions.length - 1) {
    currentQuestionIndex++;
    renderQuestion();
    renderDimDots();
  } else {
    calculateResults();
  }
}

function prevQuestion() {
  if (currentQuestionIndex > 0) {
    currentQuestionIndex--;
    renderQuestion();
    renderDimDots();
  }
}

function updateProgress() {
  const pct = ((currentQuestionIndex + 1) / questions.length) * 100;
  document.getElementById('quiz-progress-bar').style.width = pct + '%';
  document.getElementById('quiz-progress-text').textContent = `第 ${currentQuestionIndex + 1} / ${questions.length} 题`;
}

function renderDimDots() {
  const container = document.getElementById('quiz-dim-dots');
  const dims = ['ei', 'sn', 'tf', 'jp'];
  const dimNames = { ei: 'E/I', sn: 'S/N', tf: 'T/F', jp: 'J/P' };
  const currentDim = questions[currentQuestionIndex].dim;

  container.innerHTML = dims.map(d => {
    const answeredInDim = questions.filter((q, i) => q.dim === d && answers[i] !== undefined).length;
    const totalInDim = questions.filter(q => q.dim === d).length;
    let cls = '';
    if (d === currentDim) cls = 'active';
    else if (answeredInDim === totalInDim) cls = 'done';
    return `<span class="quiz-dim-dot ${cls}" title="${dimNames[d]} (${answeredInDim}/${totalInDim})"></span>`;
  }).join('');
}

// ==================== RESULTS ====================
function calculateResults() {
  const scores = { ei: 0, sn: 0, tf: 0, jp: 0 };
  const counts = { ei: 0, sn: 0, tf: 0, jp: 0 };

  questions.forEach((q, i) => {
    const raw = answers[i] || 3;
    let adjusted = raw;
    if (q.dir === -1) {
      adjusted = 6 - raw;
    }
    scores[q.dim] += adjusted;
    counts[q.dim]++;
  });

  const percentages = {};
  for (const dim of ['ei', 'sn', 'tf', 'jp']) {
    const maxScore = counts[dim] * 5;
    const minScore = counts[dim] * 1;
    const range = maxScore - minScore;
    const actual = scores[dim] - minScore;
    percentages[dim] = Math.round((actual / range) * 100);
  }

  const type = [
    percentages.ei >= 50 ? 'E' : 'I',
    percentages.sn >= 50 ? 'S' : 'N',
    percentages.tf >= 50 ? 'T' : 'F',
    percentages.jp >= 50 ? 'J' : 'P',
  ].join('');

  // Save to localStorage
  saveResultToHistory(type, percentages, scores);

  showSection('section-results');
  renderResults(type, percentages);
}

function showHistory() {
  showSection('section-history');

function renderHistory() {
  const container = document.getElementById('history-content');
  const history = loadHistory();

  if (history.length === 0) {
    container.innerHTML = `
      <h2>历史记录</h2>
      <p class="history-subtitle">你的测试结果将保存在本地浏览器中</p>
      <div class="history-empty">
        <p>暂无测试记录</p>
        <button class="btn btn-primary" style="margin-top:20px" onclick="startQuiz()">开始第一次测试</button>
      </div>
    `;
    return;
  }

  const sorted = [...history].reverse(); // newest first

  container.innerHTML = `
    <h2>历史记录</h2>
    <p class="history-subtitle">共 ${history.length} 条测试记录（保存在本地浏览器）</p>
    <div class="history-list">
      ${sorted.map(h => {
        const d = new Date(h.timestamp);
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        return `
          <div class="history-card" onclick="loadHistoryResult('${h.id}')">
            <span class="hc-type">${h.type}</span>
            <span class="hc-name">${h.name} · ${h.nickname}</span>
            <span class="hc-date">${dateStr}</span>
            <button class="hc-delete" onclick="event.stopPropagation();deleteHistoryItem('${h.id}')" title="删除">✕</button>
          </div>
        `;
      }).join('')}
    </div>
    <div style="margin-top:32px;text-align:center">
      <button class="btn btn-primary" onclick="startQuiz()">重新测试</button>
      <button class="btn btn-secondary btn-sm" style="margin-left:12px" onclick="showSection('section-landing')">返回首页</button>
    </div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function loadHistoryResult(id) {
  const history = loadHistory();
  const item = history.find(h => h.id === id);
  if (!item) return;
  showSection('section-results');
  renderResults(item.type, item.percentages);
}

// ==================== KEYBOARD NAVIGATION ====================
document.addEventListener('keydown', (e) => {
  if (!quizStarted) return;
  if (document.getElementById('section-quiz').classList.contains('active')) {
    if (e.key === 'ArrowRight' || e.key === 'Enter') {
      if (!document.getElementById('btn-next').disabled) nextQuestion();
    }
    if (e.key === 'ArrowLeft') {
      if (!document.getElementById('btn-prev').disabled) prevQuestion();
    }
    // Number keys 1-5 to select
    if (e.key >= '1' && e.key <= '5') {
      selectAnswer(parseInt(e.key));
    }
  }
});
